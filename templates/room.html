{% extends "base.html" %}
{% block title %}Imposter — Room {{ code }}{% endblock %}

{% block head %}
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
{% endblock %}

{% block content %}
<!-- Config injected by Flask, read by JS -->
<div id="cfg"
     data-code="{{ code }}"
     data-url="{{ supabase_url }}"
     data-key="{{ supabase_anon_key }}"
     style="display:none"></div>

<div id="main"></div>
{% endblock %}

{% block scripts %}
<script>
// ── Config ────────────────────────────────────────────────────────────────
const cfg   = document.getElementById('cfg').dataset;
const CODE  = cfg.code;
const SB_URL = cfg.url;
const SB_KEY = cfg.key;

// ── Session ───────────────────────────────────────────────────────────────
const PLAYER_ID   = localStorage.getItem('imposter_player_id');
const PLAYER_NAME = localStorage.getItem('imposter_name_' + CODE);
const ROOM_ID     = localStorage.getItem('imposter_room_' + CODE);

if (!PLAYER_ID || !PLAYER_NAME || !ROOM_ID) {
  window.location.href = '/multi?code=' + CODE;
}

// ── State ─────────────────────────────────────────────────────────────────
let room        = null;
let players     = [];
let myWord      = null;
let myIsImposter = false;
let wordRevealed = false;
let myVote      = null;   // player id selected
let result      = null;
let voted       = false;

// ── Supabase ──────────────────────────────────────────────────────────────
const { createClient } = supabase;
const sb = createClient(SB_URL, SB_KEY);

async function init() {
  // Initial load
  const { data: r } = await sb.from('rooms').select('*').eq('code', CODE).maybeSingle();
  if (!r) { window.location.href = '/multi'; return; }
  room = r;

  const { data: p } = await sb.from('players').select('*').eq('room_id', ROOM_ID);
  players = p || [];

  if (room.status === 'finished') await loadResult();
  render();

  // Realtime
  sb.channel('game:' + CODE)
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'rooms',
      filter: 'code=eq.' + CODE,
    }, async payload => {
      room = { ...room, ...payload.new };
      if (room.status === 'finished' && !result) await loadResult();
      render();
    })
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'players',
      filter: 'room_id=eq.' + ROOM_ID,
    }, payload => {
      const { eventType, new: n, old: o } = payload;
      if (eventType === 'INSERT') {
        if (!players.find(p => p.id === n.id)) players.push(n);
      } else if (eventType === 'UPDATE') {
        const i = players.findIndex(p => p.id === n.id);
        if (i >= 0) players[i] = n; else players.push(n);
      } else if (eventType === 'DELETE') {
        players = players.filter(p => p.id !== o.id);
      }
      render();
    })
    .subscribe();
}

// ── Render dispatcher ─────────────────────────────────────────────────────
function render() {
  if (!room) return;
  const el = document.getElementById('main');
  switch (room.status) {
    case 'waiting':  el.innerHTML = tmplLobby();   wireLobby();   break;
    case 'playing':  el.innerHTML = tmplPlaying();  wirePlaying(); break;
    case 'voting':   el.innerHTML = tmplVoting();   wireVoting();  break;
    case 'finished': el.innerHTML = tmplFinished(); break;
  }
}

// ── Lobby ─────────────────────────────────────────────────────────────────
function tmplLobby() {
  const isHost = room.host_id === PLAYER_ID;
  const readyCount = players.length;
  const needMore = Math.max(0, 3 - readyCount);

  return `
    <h1>Im<span style="color:var(--danger)">post</span>er</h1>
    <p class="subtitle">Room <strong style="color:var(--accent);letter-spacing:3px">${CODE}</strong> &mdash; share this code!</p>

    <div class="card">
      <label>Players (${players.length})</label>
      <div class="player-list" style="margin-bottom:${isHost ? '18px' : '0'}">
        ${players.map(p => `
          <div class="player-tag">
            <span>${esc(p.name)}${p.is_host ? '<span class="badge host">host</span>' : ''}</span>
            ${p.id === PLAYER_ID ? '<span class="badge">you</span>' : ''}
          </div>
        `).join('')}
      </div>

      ${isHost ? `
        <hr class="divider" style="margin-top:0"/>
        <label>Word pair <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted)">(blank = random)</span></label>
        <div class="row">
          <div><label>Normal word</label><input id="h-word" placeholder="e.g. Pizza" maxlength="32"/></div>
          <div><label>Imposter word</label><input id="h-iword" placeholder="e.g. Burger" maxlength="32"/></div>
        </div>
        <button class="btn btn-primary" id="start-btn" ${needMore > 0 ? 'disabled' : ''}>
          ${needMore > 0 ? `Need ${needMore} more player${needMore > 1 ? 's' : ''}` : 'Start Game'}
        </button>
        <div id="start-err" class="error" style="text-align:center;margin-top:6px"></div>
      ` : `
        <p style="text-align:center;color:var(--muted);font-size:0.9rem;margin-top:${players.length ? '14px' : '0'}">
          Waiting for the host to start…
        </p>
      `}
    </div>
    <a href="/" class="btn btn-ghost">← Home</a>
  `;
}

function wireLobby() {
  const btn = document.getElementById('start-btn');
  if (!btn) return;
  btn.addEventListener('click', async () => {
    const errEl = document.getElementById('start-err');
    errEl.textContent = '';
    btn.disabled = true; btn.textContent = 'Starting…';
    try {
      const res = await fetch(`/api/rooms/${CODE}/start`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          player_id: PLAYER_ID,
          word:  document.getElementById('h-word').value.trim(),
          imposter_word: document.getElementById('h-iword').value.trim(),
        }),
      });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.error || 'Error.'; btn.disabled = false; btn.textContent = 'Start Game'; }
    } catch {
      document.getElementById('start-err').textContent = 'Network error.';
      btn.disabled = false; btn.textContent = 'Start Game';
    }
  });
}

// ── Playing (reveal) ──────────────────────────────────────────────────────
function tmplPlaying() {
  const me = players.find(p => p.id === PLAYER_ID);
  const readyCount = players.filter(p => p.has_seen_word).length;
  const total = players.length;

  if (!wordRevealed) {
    return `
      <h1>Im<span style="color:var(--danger)">post</span>er</h1>
      <p class="subtitle">Your word is ready</p>
      <div class="card" style="text-align:center">
        <p style="color:var(--muted);margin-bottom:20px;font-size:0.9rem">
          Make sure no one else is watching, then tap below.
        </p>
        <button class="btn btn-primary" id="reveal-btn">Reveal my word</button>
      </div>
    `;
  }

  if (!me?.has_seen_word) {
    return `
      <h1>Im<span style="color:var(--danger)">post</span>er</h1>
      <p class="subtitle">Remember this!</p>
      <div class="card" style="text-align:center">
        <div class="word-box ${myIsImposter ? 'is-imposter' : ''}" id="word-box">
          ${myIsImposter
            ? `🕵️ You are the Imposter!<br><span style="font-size:0.85rem;opacity:.8">Your word: &ldquo;${esc(myWord)}&rdquo; — blend in!</span>`
            : esc(myWord)}
        </div>
        <p style="color:var(--muted);font-size:0.85rem;margin-bottom:20px">
          ${myIsImposter ? 'Find out what others\' word is without being caught.' : 'Give clues without saying the word directly.'}
        </p>
        <button class="btn btn-primary" id="ready-btn">I'm ready!</button>
      </div>
    `;
  }

  return `
    <h1>Im<span style="color:var(--danger)">post</span>er</h1>
    <p class="subtitle">Waiting for everyone…</p>
    <div class="card" style="text-align:center">
      <div class="word-box ${myIsImposter ? 'is-imposter' : ''}">
        ${myIsImposter
          ? `🕵️ You are the Imposter!<br><span style="font-size:0.85rem;opacity:.8">Your word: &ldquo;${esc(myWord)}&rdquo;</span>`
          : esc(myWord)}
      </div>
      <p style="color:var(--muted);font-size:0.9rem;margin-bottom:14px">
        Discuss with the group while everyone reveals their word.
      </p>
      <div class="progress-row">
        <span>${readyCount}/${total} ready</span>
        <div class="progress-bar"><div class="progress-fill" style="width:${Math.round(readyCount/total*100)}%"></div></div>
      </div>
    </div>
  `;
}

function wirePlaying() {
  const revBtn = document.getElementById('reveal-btn');
  if (revBtn) {
    revBtn.addEventListener('click', async () => {
      revBtn.disabled = true; revBtn.textContent = 'Loading…';
      try {
        const res = await fetch(`/api/rooms/${CODE}/word?player_id=${PLAYER_ID}`);
        const data = await res.json();
        if (!res.ok) { revBtn.disabled = false; revBtn.textContent = 'Reveal my word'; return; }
        myWord = data.word;
        myIsImposter = data.is_imposter;
        wordRevealed = true;
        render();
      } catch {
        revBtn.disabled = false; revBtn.textContent = 'Reveal my word';
      }
    });
  }

  const readyBtn = document.getElementById('ready-btn');
  if (readyBtn) {
    readyBtn.addEventListener('click', async () => {
      readyBtn.disabled = true; readyBtn.textContent = 'Marking ready…';
      try {
        await fetch(`/api/rooms/${CODE}/ready`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ player_id: PLAYER_ID }),
        });
        // Optimistically update local state so re-render shows waiting screen
        const me = players.find(p => p.id === PLAYER_ID);
        if (me) me.has_seen_word = true;
        render();
      } catch {
        readyBtn.disabled = false; readyBtn.textContent = 'I\'m ready!';
      }
    });
  }
}

// ── Voting ────────────────────────────────────────────────────────────────
function tmplVoting() {
  const votedCount = players.filter(p => p.has_voted).length;
  const total = players.length;

  if (voted) {
    return `
      <h1>Im<span style="color:var(--danger)">post</span>er</h1>
      <p class="subtitle">Vote submitted!</p>
      <div class="card" style="text-align:center">
        <p style="color:var(--muted);font-size:0.9rem;margin-bottom:18px">
          Waiting for everyone to vote…
        </p>
        <div class="progress-row" style="justify-content:center">
          <span>${votedCount}/${total} voted</span>
          <div class="progress-bar"><div class="progress-fill" style="width:${Math.round(votedCount/total*100)}%"></div></div>
        </div>
      </div>
    `;
  }

  return `
    <h1>Im<span style="color:var(--danger)">post</span>er</h1>
    <p class="subtitle">Who is the imposter?</p>
    <div class="card">
      <p style="color:var(--muted);font-size:0.88rem;margin-bottom:16px">
        Discuss, then cast your vote. You can't change it.
      </p>
      <div class="vote-list">
        ${players.map(p => `
          <button class="vote-btn${myVote === p.id ? ' selected' : ''}"
                  data-pid="${p.id}" onclick="selectVote('${p.id}')">
            ${esc(p.name)}${p.id === PLAYER_ID ? ' <span class="badge">you</span>' : ''}
          </button>
        `).join('')}
      </div>
      <button class="btn btn-danger" id="vote-btn" ${!myVote ? 'disabled' : ''}>Confirm Vote</button>
    </div>
  `;
}

function selectVote(pid) {
  myVote = pid;
  document.querySelectorAll('.vote-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.pid === pid);
  });
  const btn = document.getElementById('vote-btn');
  if (btn) btn.disabled = false;
}

function wireVoting() {
  const btn = document.getElementById('vote-btn');
  if (!btn) return;
  btn.addEventListener('click', async () => {
    if (!myVote) return;
    btn.disabled = true; btn.textContent = 'Submitting…';
    try {
      const res = await fetch(`/api/rooms/${CODE}/vote`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ player_id: PLAYER_ID, voted_for: myVote }),
      });
      if (res.ok) {
        voted = true;
        const me = players.find(p => p.id === PLAYER_ID);
        if (me) me.has_voted = true;
        render();
      } else {
        btn.disabled = false; btn.textContent = 'Confirm Vote';
      }
    } catch {
      btn.disabled = false; btn.textContent = 'Confirm Vote';
    }
  });
}

// ── Finished ──────────────────────────────────────────────────────────────
async function loadResult() {
  try {
    const res = await fetch(`/api/rooms/${CODE}/result`);
    if (res.ok) result = await res.json();
  } catch {}
}

function tmplFinished() {
  if (!result) {
    return `<div class="card" style="text-align:center;padding:40px">
      <p style="color:var(--muted)">Loading results…</p>
    </div>`;
  }

  const caught = result.voted_out_id === result.imposter_id;
  const iWasImposter = result.imposter_id === PLAYER_ID;

  return `
    <div class="card">
      <div class="result-hero">${caught ? '🎉' : '😈'}</div>
      <div class="result-title">${caught ? 'Imposter Caught!' : 'Imposter Wins!'}</div>
      <div class="result-sub">
        ${caught
          ? `${esc(result.voted_out_name)} was voted out — and they really were the imposter!`
          : `${esc(result.voted_out_name)} was voted out, but the imposter was ${esc(result.imposter_name)}!`}
      </div>
      <div class="reveal-info">
        Imposter: <span class="imp">${esc(result.imposter_name)}</span>${iWasImposter ? ' <span class="badge" style="color:var(--danger)">you!</span>' : ''}<br>
        Normal word: <strong>${esc(result.word)}</strong><br>
        Imposter's word: <strong>${esc(result.imposter_word)}</strong>
      </div>
      <a href="/multi" class="btn btn-primary">Play Again</a>
      <a href="/" class="btn btn-ghost">Home</a>
    </div>
  `;
}

// ── Helpers ───────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Boot ──────────────────────────────────────────────────────────────────
init();
</script>
{% endblock %}
