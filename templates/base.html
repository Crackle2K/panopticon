<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Imposter{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f13;
      --surface:  #1a1a24;
      --surface2: #24243a;
      --accent:   #6c63ff;
      --danger:   #ff6584;
      --text:     #e8e8f0;
      --muted:    #888899;
      --radius:   12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #app {
      width: 100%;
      max-width: 520px;
      padding: 24px;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -1px;
      text-align: center;
      margin-bottom: 6px;
    }
    h1 span { color: var(--danger); }

    .subtitle {
      text-align: center;
      color: var(--muted);
      margin-bottom: 28px;
      font-size: 0.95rem;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid #33334a;
      border-radius: 8px;
      color: var(--text);
      font-size: 1rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    input:focus { border-color: var(--accent); }

    .row { display: flex; gap: 10px; margin-bottom: 14px; }
    .row > * { flex: 1; }
    .row > input { margin-bottom: 0; }

    .player-list { display: flex; flex-direction: column; gap: 8px; }

    .player-tag {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface2);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 0.95rem;
    }
    .player-tag button {
      background: none; border: none; color: var(--danger);
      cursor: pointer; font-size: 1.1rem; padding: 2px 6px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.2px;
      text-align: center;
      text-decoration: none;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-danger  { background: var(--danger); color: #fff; }
    .btn-ghost   { background: var(--surface2); color: var(--text); }
    .btn + .btn  { margin-top: 10px; }

    .divider { border: none; border-top: 1px solid #2a2a3a; margin: 18px 0; }

    .error { color: var(--danger); font-size: 0.85rem; margin-top: 6px; }

    .word-box {
      font-size: 2.2rem;
      font-weight: 800;
      text-align: center;
      background: var(--surface2);
      border-radius: 10px;
      padding: 18px 24px;
      margin-bottom: 16px;
    }
    .word-box.is-imposter {
      font-size: 1rem;
      font-weight: 600;
      color: var(--danger);
      line-height: 1.6;
    }

    .vote-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
    .vote-btn {
      width: 100%;
      padding: 13px 16px;
      background: var(--surface2);
      border: 2px solid transparent;
      border-radius: 8px;
      color: var(--text);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s;
      text-align: left;
    }
    .vote-btn:hover { border-color: var(--accent); }
    .vote-btn.selected { border-color: var(--accent); background: #2a2a50; }

    .result-hero { font-size: 3rem; text-align: center; margin-bottom: 8px; }
    .result-title { font-size: 1.5rem; font-weight: 800; text-align: center; margin-bottom: 4px; }
    .result-sub { text-align: center; color: var(--muted); margin-bottom: 20px; font-size: 0.95rem; }
    .reveal-info {
      background: var(--surface2);
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 20px;
      font-size: 0.92rem;
      line-height: 1.9;
    }
    .reveal-info strong { color: var(--accent); }
    .reveal-info .imp { color: var(--danger); }

    .badge {
      display: inline-block;
      background: var(--surface2);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 0.8rem;
      color: var(--muted);
      margin-left: 6px;
    }
    .badge.host { background: #2a2a50; color: var(--accent); }

    .progress-row {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 14px;
    }
    .progress-bar {
      flex: 1;
      height: 6px;
      background: var(--surface2);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 0.4s;
    }

    .screen { animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

    .mode-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 0;
    }
    .mode-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 28px 18px;
      text-align: center;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.15s;
      text-decoration: none;
      color: var(--text);
      display: block;
    }
    .mode-card:hover { border-color: var(--accent); }
    .mode-card .icon { font-size: 2.4rem; margin-bottom: 10px; }
    .mode-card h2 { font-size: 1.1rem; margin-bottom: 6px; }
    .mode-card p { font-size: 0.82rem; color: var(--muted); line-height: 1.5; }

    .code-display {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 6px;
      text-align: center;
      color: var(--accent);
      background: var(--surface2);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 18px;
    }
    .code-hint { text-align: center; color: var(--muted); font-size: 0.82rem; margin-top: -10px; margin-bottom: 18px; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
<div id="app" class="screen">
  {% block content %}{% endblock %}
</div>
{% block scripts %}{% endblock %}
</body>
</html>
