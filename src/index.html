<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dynamic Island</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="island">
    <div class="spotify-container" id="spotifyContainer">
      <div class="loading">🎵 Loading...</div>
    </div>
  </div>

  <script>
    const island = document.querySelector('.island');
    const spotifyContainer = document.getElementById('spotifyContainer');
    let isDragging = false;
    let startX = 0;
    let startY = 0;
    let windowX = 0;
    let windowY = 0;

    island.addEventListener('mousedown', (e) => {
      isDragging = true;
      startX = e.screenX;
      startY = e.screenY;

      window.electron.getWindowPosition((x, y) => {
        windowX = x;
        windowY = y;
      });
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;

      const deltaX = e.screenX - startX;
      const deltaY = e.screenY - startY;

      window.electron.moveWindow(windowX + deltaX, windowY + deltaY);
    });

    document.addEventListener('mouseup', () => {
      isDragging = false;
    });

    async function updateSpotifyTrack() {
      try {
        const track = await window.electron.getSpotifyTrack();
        if (track) {
          spotifyContainer.innerHTML = `
            <svg class="spotify-icon" viewBox="0 0 63 63" xmlns="http://www.w3.org/2000/svg">
              <circle cx="31.5" cy="31.5" r="31.5" fill="#1db954"/>
              <path d="M45 16.5c-7.7-4.7-20.1-5.1-27.4-2.8-1.2.4-1.9 1.7-1.5 2.9.4 1.2 1.7 1.9 2.9 1.5 6.4-2 17.5-1.6 24.1 2.2 1 .6 2.3.3 2.9-.7.6-1 .3-2.3-.7-2.9zm-3 8.1c-.9 1.4-2.8 1.8-4.2.9-6.5-4-16.4-5.1-24.1-2.8-1.6.5-3.3-.3-3.8-1.9-.5-1.6.3-3.3 1.9-3.8 9.1-2.8 20.3-1.5 28.1 3.2 1.4.8 1.8 2.8.9 4.2zM42 33c-.8 1.2-2.4 1.6-3.6.8-5.6-3.5-14.1-4.5-20.7-2.5-1.4.4-2.8-.5-3.2-1.9-.4-1.4.5-2.8 1.9-3.2 7.6-2.3 17.2-1.1 23.7 2.8 1.2.7 1.6 2.3.8 3.6z" fill="white"/>
            </svg>
            <div class="track-name">${track.name}</div>
            <div class="artist-name">${track.artist}</div>
          `;
        } else {
          spotifyContainer.innerHTML = '<div class="loading">Not playing</div>';
        }
      } catch (error) {
        spotifyContainer.innerHTML = '<div class="loading">Click to connect Spotify</div>';
      }
    }

    updateSpotifyTrack();
    setInterval(updateSpotifyTrack, 5000);

    island.addEventListener('click', async () => {
      await window.electron.openSpotifyAuth();
    });
  </script>
</body>
</html>
